<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Calendario Académico</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="agregarEvento()">
        <ion-icon name="add-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-datetime
    presentation="date"
    [(ngModel)]="fechaSeleccionada"
    (ionChange)="onFechaChange()">
  </ion-datetime>

  <ion-list *ngIf="eventosDelDia.length > 0">
    <ion-list-header>
      <ion-label>Eventos del {{ fechaSeleccionada | date:'dd/MM/yyyy' }}</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let evento of eventosDelDia">
      <ion-icon [name]="evento.tipo === 'feriado' ? 'calendar' : 'school'" slot="start"
                [color]="evento.tipo === 'feriado' ? 'danger' : 'primary'"></ion-icon>
      <ion-label>
        <h2>{{ evento.titulo }}</h2>
        <p>{{ evento.descripcion }}</p>
      </ion-label>
      <ion-badge slot="end" [color]="evento.tipo === 'feriado' ? 'danger' : 'tertiary'">
        {{ evento.tipo }}
      </ion-badge>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="eventosDelDia.length === 0" lines="none">
    <ion-label class="ion-text-center" color="medium">
      <p>No hay eventos para esta fecha.</p>
    </ion-label>
  </ion-item>

  <ion-list *ngIf="proximosEventos.length > 0">
    <ion-list-header>
      <ion-label>Próximos eventos</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let evento of proximosEventos">
      <ion-icon [name]="evento.tipo === 'feriado' ? 'calendar' : 'school'" slot="start"
                [color]="evento.tipo === 'feriado' ? 'danger' : 'primary'"></ion-icon>
      <ion-label>
        <h3>{{ evento.titulo }}</h3>
        <p>{{ evento.fecha | date:'dd/MM/yyyy' }} — {{ evento.descripcion }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
