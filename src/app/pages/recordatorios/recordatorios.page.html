<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Recordatorios</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="agregarRecordatorio()">
        <ion-icon name="add-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let rec of recordatorios">
      <ion-item [color]="rec.completado ? '' : (rec.prioridad === 'alta' ? 'danger' : (rec.prioridad === 'media' ? 'warning' : ''))">
        <ion-checkbox slot="start" [(ngModel)]="rec.completado" (ionChange)="actualizarCompletado(rec)"></ion-checkbox>
        <ion-label [class.completado]="rec.completado">
          <h2>{{ rec.titulo }}</h2>
          <p>{{ obtenerNombreAsignatura(rec.asignaturaId) }}</p>
          <p>{{ rec.fechaLimite | date:'dd/MM/yyyy HH:mm' }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="rec.prioridad === 'alta' ? 'danger' : (rec.prioridad === 'media' ? 'warning' : 'medium')">
          {{ rec.prioridad }}
        </ion-badge>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="eliminarRecordatorio(rec.id)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-item *ngIf="recordatorios.length === 0" lines="none">
    <ion-label class="ion-text-center">
      <p>No hay recordatorios. Toca + arriba para crear uno.</p>
    </ion-label>
  </ion-item>
</ion-content>
