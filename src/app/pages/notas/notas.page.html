<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Notas Offline</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="nuevaNota()">
        <ion-icon name="add"></ion-icon>
      </ion-button>
      <ion-button (click)="sincronizar()">
        <ion-icon name="cloud-upload"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let nota of notas" button (click)="editarNota(nota)">
      <ion-label>
        <h2>{{ nota.titulo }}</h2>
        <p>{{ nota.fechaModificacion | date:'dd/MM/yyyy HH:mm' }}</p>
        <p *ngIf="!nota.sincronizada" style="color: orange;">⚠️ Pendiente de sincronizar</p>
      </ion-label>
      <ion-buttons slot="end">
        <ion-button (click)="eliminarNota(nota.id); $event.stopPropagation()">
          <ion-icon name="trash"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-item>
  </ion-list>
</ion-content>
