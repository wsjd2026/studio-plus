<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Notas Offline</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="sincronizar()">
        <ion-icon name="cloud-upload" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="nuevaNota()">
        <ion-icon name="add-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item lines="none">
    <ion-chip [color]="isOnline ? 'success' : 'danger'" slot="start">
      <ion-icon [name]="isOnline ? 'wifi' : 'cloud-offline'"></ion-icon>
      <ion-label>{{ isOnline ? 'En línea' : 'Sin conexión' }}</ion-label>
    </ion-chip>
    <ion-badge *ngIf="pendingCount > 0" color="warning" slot="end">
      {{ pendingCount }} pendiente{{ pendingCount > 1 ? 's' : '' }}
    </ion-badge>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let nota of notas" button (click)="editarNota(nota)">
      <ion-label>
        <h2>{{ nota.titulo }}</h2>
        <p>{{ nota.fechaModificacion | date:'dd/MM/yyyy HH:mm' }}</p>
        <p *ngIf="!nota.sincronizada" style="color: orange;">Pendiente de sincronizar</p>
      </ion-label>
      <ion-button fill="clear" slot="end" (click)="eliminarNota(nota.id); $event.stopPropagation()">
        <ion-icon name="trash" color="danger"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="notas.length === 0" lines="none">
    <ion-label class="ion-text-center">
      <p>No hay notas aún. Toca + arriba para crear una.</p>
    </ion-label>
  </ion-item>
</ion-content>
