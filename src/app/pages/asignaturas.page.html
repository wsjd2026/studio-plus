<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Mis Asignaturas</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="agregarAsignatura()">
        <ion-icon name="add-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let asignatura of asignaturas">
      <ion-item [style.border-left]="'5px solid ' + asignatura.color" button (click)="verMateriales(asignatura.id)">
        <ion-label>
          <h2>{{ asignatura.nombre }}</h2>
          <p>Docente: {{ asignatura.docente }}</p>
          <p>{{ asignatura.descripcion }}</p>
        </ion-label>
        <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="editar(asignatura)">
          <ion-icon name="pencil" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="eliminar(asignatura.id)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-item *ngIf="asignaturas.length === 0" lines="none">
    <ion-label class="ion-text-center">
      <p>No hay asignaturas. Toca + arriba para agregar.</p>
    </ion-label>
  </ion-item>
</ion-content>
